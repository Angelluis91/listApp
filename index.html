<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>La Compra</title>
</head>
<body>

  <!-- Indicador de sincronización -->
  <div id="sync-dot" title="Estado de sincronización"></div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <div class="tab active" id="tab-main">
      <span class="tab-icon">🛒</span> La Compra
    </div>
    <div class="tab" id="tab-lists">
      <span class="tab-icon">📋</span> Mis Listas
    </div>
  </div>

  <!-- SCREEN: LA COMPRA -->
  <div class="screen active" id="screen-main">
    <div class="screen-header" id="main-header">
      <div class="header-row">
        <div class="header-title">🛒 La Compra</div>
        <div style="display:flex;gap:6px">
          <button class="header-back" id="btn-pending">Ver pendientes</button>
          <button class="header-back" id="btn-clear">Limpiar</button>
        </div>
      </div>
      <div class="summary-bar">
        <div class="sum-block">
          <div class="sum-num white" id="s-total">0</div>
          <div class="sum-label">Total</div>
        </div>
        <div class="sum-divider"></div>
        <div class="sum-block">
          <div class="sum-num green" id="s-done">0</div>
          <div class="sum-label">Seleccionados</div>
        </div>
      </div>
      <div class="global-progress">
        <div class="global-progress-fill" id="g-prog" style="width:0%"></div>
      </div>
    </div>
    <div class="content">
      <div id="selected-summary"></div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="main-search" placeholder="Buscar producto...">
      </div>
      <div id="main-sections"></div>
    </div>
  </div>

  <!-- SCREEN: MIS LISTAS -->
  <div class="screen" id="screen-lists">
    <div class="lists-header">
      <div class="header-title">📋 Mis Listas</div>
      <div class="lists-subtitle">Listas personalizadas</div>
    </div>
    <div class="lists-content">
      <button class="new-list-btn" id="btn-new-list">＋ Nueva lista</button>
      <div id="lists-container"></div>
    </div>
  </div>

  <!-- SCREEN: DETALLE LISTA -->
  <div class="screen" id="screen-detail">
    <div class="detail-header" id="detail-header">
      <div class="header-row">
        <button class="header-back" id="btn-back">← Volver</button>
        <div id="detail-title" class="header-title" style="font-size:1.2rem"></div>
        <div style="width:60px"></div>
      </div>
      <div class="summary-bar">
        <div class="sum-block">
          <div class="sum-num white" id="d-total">0</div>
          <div class="sum-label">Total</div>
        </div>
        <div class="sum-divider"></div>
        <div class="sum-block">
          <div class="sum-num green" id="d-done">0</div>
          <div class="sum-label">Seleccionados</div>
        </div>
      </div>
      <div class="global-progress">
        <div class="global-progress-fill" id="d-prog" style="width:0%"></div>
      </div>
    </div>
    <div class="add-item-bar">
      <input type="text" id="new-item-input" placeholder="Añadir producto...">
      <button id="btn-add-item">Añadir</button>
    </div>
    <div class="detail-content">
      <div id="detail-items"></div>
    </div>
  </div>

  <!-- MODAL NUEVA / EDITAR LISTA -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3 id="modal-title">Nueva lista</h3>
      <div class="modal-field">
        <label>Nombre</label>
        <input type="text" id="modal-name" placeholder="ej: Farmacia, Viaje...">
      </div>
      <div class="modal-field">
        <label>Icono</label>
        <div class="emoji-picker" id="emoji-picker"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-modal-cancel">Cancelar</button>
        <button class="btn-create" id="btn-modal-create">Crear</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
